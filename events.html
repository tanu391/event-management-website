<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <h2>EventPro</h2>
</nav>

<h2>Upcoming Events</h2>

<input type="text" id="searchInput" placeholder="Search events...">

<div class="event-container" id="eventList">

    <div class="event-card">
        <img src="images/coding.jpg" alt="Coding Event">
        <h3>Coding Competition</h3>
        <p>Date: 30 March 2026</p>
    </div>

    <div class="event-card">
        <img src="images/dance.jpg" alt="Dance Event">
        <h3>Dance Battle</h3>
        <p>Date: 2 April 2026</p>
    </div>

    <div class="event-card">
        <img src="images/quiz.jpg" alt="Quiz Event">
        <h3>Business Quiz</h3>
        <p>Date: 5 April 2026</p>
    </div>

</div>

<script src="js/script.js"></script>

<script>
  window.watsonAssistantChatOptions = {
    integrationID: "3b0b4a07-9b49-4d91-adcb-70caa9f7294e", // The ID of this integration.
    region: "au-syd", // The region your integration is hosted in.
    serviceInstanceID: "75633ebc-ccbf-460c-8058-bc1a442b0494", // The ID of your service instance.
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
